<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" font-family="DM Sans, sans-serif">
  <rect width="400" height="360" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4332">Acceleration Through Impact</text>

  <!-- Axes -->
  <line x1="60" y1="60" x2="60" y2="260" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="260" x2="360" y2="260" stroke="#999" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="22" y="160" text-anchor="middle" font-size="10" fill="#999" transform="rotate(-90 22 160)">Putter Speed</text>

  <!-- X axis labels -->
  <text x="110" y="278" text-anchor="middle" font-size="10" fill="#999">Backswing</text>
  <text x="210" y="278" text-anchor="middle" font-size="10" fill="#999">Impact</text>
  <text x="310" y="278" text-anchor="middle" font-size="10" fill="#999">Follow-thru</text>

  <!-- Impact line -->
  <line x1="210" y1="60" x2="210" y2="260" stroke="#C5A55A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="210" cy="268" r="3" fill="#C5A55A"/>

  <!-- GOOD curve - accelerating through impact -->
  <path d="M 80,250 C 120,245 160,200 210,140 C 240,105 280,85 340,80"
        fill="none" stroke="#2D6A4F" stroke-width="3" stroke-linecap="round"/>

  <!-- BAD curve - decelerating through impact -->
  <path d="M 80,250 C 110,240 150,140 185,110 C 200,95 210,100 230,130 C 260,180 300,210 340,220"
        fill="none" stroke="#CC4444" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 4"/>

  <!-- Legend -->
  <g transform="translate(90, 305)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#2D6A4F" stroke-width="3" stroke-linecap="round"/>
    <text x="32" y="4" font-size="11" font-weight="600" fill="#2D6A4F">Accelerating (good)</text>
  </g>

  <g transform="translate(90, 328)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#CC4444" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 4"/>
    <text x="32" y="4" font-size="11" font-weight="600" fill="#CC4444">Decelerating (bad)</text>
  </g>

  <!-- Annotation arrows at impact -->
  <!-- Good - arrow going up -->
  <g transform="translate(225, 120)">
    <polygon points="0,-12 5,0 -5,0" fill="#2D6A4F"/>
    <text x="12" y="-4" font-size="9" font-weight="600" fill="#2D6A4F">Speed increasing</text>
  </g>

  <!-- Bad - arrow going down -->
  <g transform="translate(225, 155)">
    <polygon points="0,12 5,0 -5,0" fill="#CC4444"/>
    <text x="12" y="8" font-size="9" font-weight="600" fill="#CC4444">Speed dropping</text>
  </g>
</svg>
