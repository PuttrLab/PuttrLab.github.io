<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" font-family="DM Sans, sans-serif">
  <rect width="400" height="360" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1B4332">Putting Tempo</text>

  <!-- Timeline bar - Backstroke -->
  <rect x="40" y="80" width="200" height="40" rx="6" fill="#1B4332"/>
  <text x="140" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#FFF">Backstroke</text>

  <!-- Timeline bar - Forward stroke -->
  <rect x="240" y="80" width="100" height="40" rx="6" fill="#C5A55A"/>
  <text x="290" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1B4332">Forward</text>

  <!-- Ratio label -->
  <text x="200" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#1B4332">2 : 1 Ratio</text>
  <text x="200" y="163" text-anchor="middle" font-size="11" fill="#555">Ideal tour tempo</text>

  <!-- Divider -->
  <line x1="60" y1="185" x2="340" y2="185" stroke="#D0D0D0" stroke-width="1"/>

  <!-- Consistent tempo example -->
  <text x="200" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#2D6A4F">Consistent Tempo (Good)</text>

  <!-- Putt 1 -->
  <text x="40" y="237" font-size="10" fill="#999">Putt 1</text>
  <rect x="80" y="225" width="140" height="16" rx="4" fill="#2D6A4F"/>
  <rect x="220" y="225" width="70" height="16" rx="4" fill="#40916C"/>

  <!-- Putt 2 -->
  <text x="40" y="259" font-size="10" fill="#999">Putt 2</text>
  <rect x="80" y="247" width="140" height="16" rx="4" fill="#2D6A4F"/>
  <rect x="220" y="247" width="70" height="16" rx="4" fill="#40916C"/>

  <!-- Putt 3 -->
  <text x="40" y="281" font-size="10" fill="#999">Putt 3</text>
  <rect x="80" y="269" width="140" height="16" rx="4" fill="#2D6A4F"/>
  <rect x="220" y="269" width="70" height="16" rx="4" fill="#40916C"/>

  <!-- Annotation -->
  <g transform="translate(200, 315)">
    <rect x="-140" y="-14" width="280" height="28" rx="6" fill="#1B4332"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="500" fill="#FFF">Your ratio matters less than keeping it consistent</text>
  </g>
</svg>
